<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="style.css"> 
    <canvas id="canvas" style="display:none;"></canvas>
    
</head>
<body>
 
  <div class="app-wrapper">
 
    <header class="app-header">
      <div class="header-label">OCR</div>
      <h1>Lector de Recibos</h1>
      <p class="header-sub">Extraé datos de tus comprobantes automáticamente</p>
    </header>
 
    <main class="app-main">
 
      <!-- UPLOAD ZONE -->
      <section class="upload-section">
        <label for="imageInput" class="drop-zone" id="dropZone">
          <div class="drop-zone__icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <span class="drop-zone__text">Seleccioná imágenes</span>
          <span class="drop-zone__hint">JPG, PNG, WEBP — múltiples archivos</span>
          <input type="file" id="imageInput" multiple accept="image/*">
        </label>
 
        <button id="scanBtn" class="btn btn--primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
          </svg>
          Escanear recibos
        </button>
 
        <!-- PROGRESS BAR (oculta por defecto) -->
        <div class="progress-wrap" id="progressWrap" style="display:none;">
          <div class="progress-bar" id="progressBar"></div>
          <span class="progress-label" id="progressLabel">Procesando...</span>
        </div>
      </section>
 
      <!-- TABS -->
      <div class="tabs" id="resultSection" style="display:none;">
        <div class="tabs__nav">
          <button class="tabs__btn tabs__btn--active" id="showTableBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/>
            </svg>
            Datos extraídos
          </button>
          <button class="tabs__btn" id="showRawBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            Texto OCR
          </button>
        </div>
 
        <!-- TABLA -->
        <div id="tableView" class="tabs__panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Empresa</th>
                  <th>Fecha</th>
                  <th>Neto (sin IVA)</th>
                  <th>Total (con IVA)</th>
                  <th>RUT</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
 
        <!-- TEXTO OCR -->
        <div id="rawView" class="tabs__panel" style="display:none;">
          <div id="rawTexts"></div>
        </div>
 
      </div>
 
    </main>
 
  </div>
 
  <canvas id="canvas" style="display:none;"></canvas>
  <script src="script.js"></script>
 
</body>
</html>
